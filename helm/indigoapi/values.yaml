replicaCount: 1

image:
  repository: indigoapi
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: ixx-indigoapi.diamond.ac.uk
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  rabbitmq:
    enabled: true
    host: i15-1-rabbitmq-daq.diamond.ac.uk
    port: 61613
    username: guest
    password: guest
    destinations:
      - /topic/public.worker.event
      - /topic/gda.messages.scan
      - /topic/gda.messages.processing

  queue:
    workers: 4

  plugins:
    paths:
      - /app/plugins
    github_repos: []

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

nodeSelector: {}

tolerations: []

affinity: {}
