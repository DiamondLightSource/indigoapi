replicaCount: 1

image:
  repository: ghcr.io/diamondlightsource/indigoapi
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  limits:
    cpu: 4
    memory: 12Gi
  requests:
    cpu: 1
    memory: 4Gi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

config:
  server:
    host: "0.0.0.0"
    port: 8000
  queue:
    workers: 4
  results:
    ttl_seconds: 3600
  cleanup:
    interval_seconds: 300
  plugins:
    paths:
      - ./plugins
    github_repos: []
    register_all: True # whether to register all analyses found in plugins or only those decorated
  rabbitmq:
    enabled: true
    host: "ixx-rabbitmq-daq.diamond.ac.uk"
    username: guest
    password: guest
    port: 61613
    destinations:
      - "/topic/public.worker.event" #bluesky scans
      - "/topic/gda.messages.scan" # gda scans
      - "/topic/gda.messages.processing" # dawn stuff
      - "/topic/public.analysis.trigger" # custom topic for triggering analyses from other services
  uvicorn:
    workers: 1
  logging:
    graylog:
      enabled: false
      url: ""
      level: "INFO"
    stream:
      enabled: true
      level: "DEBUG"

volumeMounts: []
volumes: []
nodeSelector: {}
tolerations: []
